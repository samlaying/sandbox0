apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sandbox0-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: sandbox0-plugin
  template:
    metadata:
      labels:
        name: sandbox0-plugin
    spec:
      hostNetwork: true
      containers:
      - image: sandbox0ai/infra:latest
        name: fuse-device-plugin-ctr
        env:
        - name: SERVICE
          value: "k8s-plugin"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: device-plugin
            mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
