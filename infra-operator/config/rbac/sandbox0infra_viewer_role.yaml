# permissions for end users to view sandbox0infras.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: sandbox0infra-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: sandbox0infra
    app.kubernetes.io/part-of: sandbox0infra
    app.kubernetes.io/managed-by: kustomize
  name: sandbox0infra-viewer-role
rules:
- apiGroups:
  - infra.sandbox0.ai
  resources:
  - sandbox0infras
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infra.sandbox0.ai
  resources:
  - sandbox0infras/status
  verbs:
  - get
