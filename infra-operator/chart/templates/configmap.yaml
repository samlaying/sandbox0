apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "infra-operator.fullname" . }}-config
  labels:
    {{- include "infra-operator.labels" . | nindent 4 }}
data:
  config.yaml: |
    imageRepo: {{ .Values.config.imageRepo | default "sandbox0ai/infra" }}
    imageTag: {{ .Values.config.imageTag | default (.Values.image.tag | default .Chart.AppVersion) }}
    {{ if .Values.config.imagePullPolicy }}
    imagePullPolicy: {{ .Values.config.imagePullPolicy }}
    {{ end }}
