# Example: Cloud control plane mode
apiVersion: infra.sandbox0.ai/v1alpha1
kind: Sandbox0Infra
metadata:
  name: sandbox0-control-plane
  namespace: sandbox0-system
spec:
  mode: control-plane
  region: aws/us-east-1
  version: "v0.0.0"
  database:
    type: postgres
    external:
      host: sandbox0-db.xxxx.us-east-1.rds.amazonaws.com
      port: 5432
      database: sandbox0
      username: sandbox0
      passwordSecret:
        name: db-credentials
        key: password
      sslMode: require
  storage:
    type: s3
    s3:
      bucket: sandbox0-prod-us-east-1
      region: us-east-1
      credentialsSecret:
        name: aws-credentials
        accessKeyKey: accessKeyId
        secretKeyKey: secretAccessKey
  services:
    edgeGateway:
      enabled: true
      replicas: 3
      service:
        type: LoadBalancer
        port: 80
      ingress:
        enabled: true
        className: nginx
        host: api.sandbox0.io
        tlsSecret: api-tls
    scheduler:
      enabled: true
      replicas: 1
  initUser:
    enabled: true
    email: "admin@yourdomain.com"
    passwordSecret:
      name: admin-password
      key: password
