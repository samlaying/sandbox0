name: Build Template Image

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Target CPU architecture"
        required: true
        default: "amd64"
        type: choice
        options:
          - amd64
          - arm64
      version:
        description: "Template image tag (e.g. default-v0.1.0)"
        required: true
        default: "default-v0.1.0"
      dockerfile:
        description: "Dockerfile path relative to repo root"
        required: true
        default: "manager/procd/Dockerfile.default"

jobs:
  build-template-image:
    name: Build otemplates image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_REPO: sandbox0ai/otemplates
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push template image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/${{ inputs.arch }}
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ inputs.version }}

      - name: Print published image
        shell: bash
        run: |
          echo "Published image: ${IMAGE_REPO}:${{ inputs.version }}"
          echo "Dockerfile: ${{ inputs.dockerfile }}"
          echo "Platform: linux/${{ inputs.arch }}"
